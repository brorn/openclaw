services:
  openclaw:
    build: .
    init: true
    restart: unless-stopped
    volumes:
      - auth:/home/openclaw/.openclaw
      - ./secrets:/run/secrets:ro
    env_file: .env
    ports:
      - "127.0.0.1:9201:9201"
      - "127.0.0.1:18701:18701"
    mem_limit: 1536M
    memswap_limit: 1536M
    cpus: "1"
    read_only: true
    tmpfs:
      - /tmp:size=64M
      - /run/openclaw:size=1M
    security_opt:
      - no-new-privileges:true
      - seccomp:seccomp-profile.json
    cap_drop:
      - ALL
    pids_limit: 128
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - openclaw-net

networks:
  openclaw-net:
    driver: bridge

volumes:
  auth:
