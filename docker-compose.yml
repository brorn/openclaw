services:
  openclaw:
    build: .
    restart: unless-stopped
    volumes:
      - auth:/home/openclaw/.openclaw
    env_file: .env
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1536M
        reservations:
          memory: 512M
    memswap_limit: 1536M
    read_only: true
    tmpfs:
      - /tmp:size=64M
      - /run/openclaw:size=1M
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 128

volumes:
  auth:
